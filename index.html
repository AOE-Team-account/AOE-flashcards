    function getText(key, ...args) {
      let text = translations[currentLang][key] || translations.en[key] || key;
      args.forEach((arg, i) => text = text.replace(`{${i}}`, arg));
      return text;
    }

    function getDaysSince(lastReviewed) {
      if (!lastReviewed) return Infinity;
      const now = new Date();
      const reviewDate = new Date(lastReviewed);
      const nowMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const reviewMidnight = new Date(reviewDate.getFullYear(), reviewDate.getMonth(), reviewDate.getDate());
      return Math.floor((nowMidnight.getTime() - reviewMidnight.getTime()) / 86400000);
    }

    let SQL = null;

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

    async function initSQL() {
      if (SQL) return;
      const config = { locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` };
      SQL = await initSqlJs(config);
    }

    function buildBackupPayload() {
      return {
        version: 1,
        app: "AOE flashcards",
        exportedAt: new Date().toISOString(),
        decks: decks,
        settings: globalSettings,
        lang: currentLang
      };
    }

    function getLocalVersions() {
      try {
        return JSON.parse(localStorage.getItem(AUTO_SAVE_VERSIONS_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveAutoVersion(reason) {
      if (isRestoringVersion) return;

      try {
        const payload = buildBackupPayload();
        const versions = getLocalVersions();
        const snapshot = JSON.stringify({
          decks: payload.decks,
          settings: payload.settings,
          lang: payload.lang
        });

        if (versions.length > 0 && versions[0].snapshot === snapshot) return;

        versions.unshift({
          id: generateId(),
          timestamp: Date.now(),
          reason: reason || 'autosave',
          snapshot: snapshot,
          deckCount: Array.isArray(payload.decks) ? payload.decks.length : 0,
          cardCount: Array.isArray(payload.decks)
            ? payload.decks.reduce((sum, d) => sum + ((d.cards && d.cards.length) || 0), 0)
            : 0
        });

        while (versions.length > AUTO_SAVE_MAX_VERSIONS) {
          versions.pop();
        }

        localStorage.setItem(AUTO_SAVE_VERSIONS_KEY, JSON.stringify(versions));
      } catch (e) {
        console.warn('Auto-save failed', e);
      }
    }

    function loadData() {
      const savedDecks = localStorage.getItem('aoe_decks');
      const savedSettings = localStorage.getItem('aoe_settings');
      const savedLang = localStorage.getItem('aoe_lang');
      if (savedDecks) decks = JSON.parse(savedDecks);
      if (savedSettings) globalSettings = JSON.parse(savedSettings);
      if (savedLang) currentLang = savedLang;
    }

    function saveData(reason) {
      localStorage.setItem('aoe_decks', JSON.stringify(decks));
      localStorage.setItem('aoe_settings', JSON.stringify(globalSettings));
      localStorage.setItem('aoe_lang', currentLang);
      saveAutoVersion(reason || 'save');
    }

    function exportJSONBackup() {
      try {
        const payload = buildBackupPayload();
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        a.href = url;
        a.download = `aoe-flashcards-backup-${stamp}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error(e);
        alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '导出失败。' : 'Export failed.');
      }
    }

    function triggerJSONImport() {
      let input = document.getElementById('json-backup-import');
      if (!input) {
        input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json,application/json';
        input.id = 'json-backup-import';
        input.style.display = 'none';
        document.body.appendChild(input);
      }

      input.value = '';
      input.onchange = function() {
        importJSONBackup(input);
      };
      input.click();
    }

    function importJSONBackup(input) {
      const file = input.files && input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);

          if (!Array.isArray(parsed.decks) || !parsed.settings || typeof parsed.settings !== 'object') {
            throw new Error('Invalid backup file');
          }

          const ok = confirm(
            (currentLang === 'zh' || currentLang === 'zh-TW')
              ? '导入这个 JSON 备份？当前数据会被替换。'
              : 'Import this JSON backup? Your current data will be replaced.'
          );
          if (!ok) return;

          saveAutoVersion('before-json-import');

          decks = parsed.decks || [];
          globalSettings = parsed.settings || globalSettings;
          currentLang = parsed.lang || currentLang;

          localStorage.setItem('aoe_decks', JSON.stringify(decks));
          localStorage.setItem('aoe_settings', JSON.stringify(globalSettings));
          localStorage.setItem('aoe_lang', currentLang);

          saveAutoVersion('json-import');

          hideSettingsModal();
          applyTextSize();
          updateNav();
          render(0);

          if (currentDeckId && decks.find(d => d.id === currentDeckId)) {
            openDeck(currentDeckId);
          } else {
            currentDeckId = null;
          }

          alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '✅ JSON 导入成功' : '✅ JSON imported successfully.');
        } catch (err) {
          console.error(err);
          alert((currentLang === 'zh' || currentLang === 'zh-TW') ? 'JSON 导入失败。' : 'JSON import failed.');
        }
      };
      reader.readAsText(file);
    }

    function restoreLocalVersion(versionId) {
      const versions = getLocalVersions();
      const version = versions.find(v => v.id === versionId);
      if (!version) {
        alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '找不到该版本。' : 'Version not found.');
        return;
      }

      const ok = confirm(
        (currentLang === 'zh' || currentLang === 'zh-TW')
          ? '恢复这个本地版本？当前数据会被替换。'
          : 'Restore this local version? Your current data will be replaced.'
      );
      if (!ok) return;

      try {
        const parsed = JSON.parse(version.snapshot);
        isRestoringVersion = true;

        decks = parsed.decks || [];
        globalSettings = parsed.settings || globalSettings;
        currentLang = parsed.lang || currentLang;

        localStorage.setItem('aoe_decks', JSON.stringify(decks));
        localStorage.setItem('aoe_settings', JSON.stringify(globalSettings));
        localStorage.setItem('aoe_lang', currentLang);

        isRestoringVersion = false;
        saveAutoVersion('restore-local-version');

        hideSettingsModal();
        applyTextSize();
        updateNav();
        render(0);

        if (currentDeckId && decks.find(d => d.id === currentDeckId)) {
          openDeck(currentDeckId);
        } else {
          currentDeckId = null;
        }

        alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '✅ 已恢复版本' : '✅ Version restored.');
      } catch (e) {
        isRestoringVersion = false;
        console.error(e);
        alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '恢复失败。' : 'Restore failed.');
      }
    }

    function formatVersionTime(ts) {
      try {
        return new Date(ts).toLocaleString();
      } catch (e) {
        return String(ts);
      }
    }

    function renderBackupTools() {
      let container = document.getElementById('backup-tools-container');
      if (!container) return;

      const versions = getLocalVersions();
      let versionsHTML = '';

      if (versions.length === 0) {
        versionsHTML = '<div style="color:#64748b;font-size:14px;">No saved local versions yet.</div>';
      } else {
        versionsHTML = versions.map(v => {
          return `
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e2e8f0;">
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:14px;">${formatVersionTime(v.timestamp)}</div>
                <div style="color:#64748b;font-size:13px;">${v.deckCount} decks • ${v.cardCount} cards • ${v.reason}</div>
              </div>
              <button onclick="restoreLocalVersion('${v.id}')" class="btn" style="background:#e2e8f0;padding:10px 16px;">Restore</button>
            </div>
          `;
        }).join('');
      }

      container.innerHTML = `
        <div style="margin-top:28px;border-top:1px solid #e2e8f0;padding-top:24px;">
          <h3 style="font-size:18px;font-weight:700;margin-bottom:12px;">Backup & Save</h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
            <button onclick="exportJSONBackup()" class="btn" style="background:#e2e8f0;">Export JSON</button>
            <button onclick="triggerJSONImport()" class="btn" style="background:#e2e8f0;">Import JSON</button>
          </div>
          <div style="background:#f8fafc;border-radius:16px;padding:16px;">
            <div style="font-weight:600;margin-bottom:8px;">Auto-saved local versions</div>
            <div style="color:#64748b;font-size:13px;margin-bottom:8px;">Newest ${AUTO_SAVE_MAX_VERSIONS} versions are stored on this device.</div>
            ${versionsHTML}
          </div>
        </div>
      `;
    }

    function getTotalCards() {
      return decks.reduce((a, d) => a + (d.cards ? d.cards.length : 0), 0);
    }

    function getNewDue(deck) {
      return deck.cards ? deck.cards.filter(c => c.section === 1).length : 0;
    }

    function getReviewDue(deck) {
      return deck.cards ? deck.cards.filter(c => {
        if (c.section === 1) return false;
        if (!c.lastReviewed) return false;
        const daysPassed = getDaysSince(c.lastReviewed);
        const interval = globalSettings.intervals[c.section - 1] || 3;
        return daysPassed >= interval;
      }).length : 0;
    }

    function getNewDueToday() {
      let count = 0;
      decks.forEach(d => count += getNewDue(d));
      return count;
    }

    function getReviewDueToday() {
      let count = 0;
      decks.forEach(d => count += getReviewDue(d));
      return count;
    }

    function updateNav() {
      const container = document.getElementById('nav-container');
      container.innerHTML = `
        <div onclick="navigateTo(0)" class="nav-btn active" id="nav-0">${getText('nav_home')}</div>
        <div onclick="navigateTo(1)" class="nav-btn" id="nav-1">${getText('nav_create')}</div>
        <div onclick="navigateTo(4)" class="nav-btn" id="nav-4">${getText('nav_settings')}</div>
      `;
    }

    function navigateTo(tab) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const active = document.getElementById(`nav-${tab}`);
      if (active) active.classList.add('active');
      if (tab === 4) showSettingsModal();
      else if (tab === 1) showCreateDeckModal();
      else render(tab);
    }

    function applyTextSize() {
      document.documentElement.style.fontSize = globalSettings.textSize + 'px';
      const frontText = document.getElementById('front-text');
      const backText = document.getElementById('back-text');
      if (frontText) frontText.style.fontSize = (globalSettings.textSize + 8) + 'px';
      if (backText) backText.style.fontSize = (globalSettings.textSize + 8) + 'px';
    }

    function render(tab) {
      const main = document.getElementById('main-content');
      if (tab === 0) {
        const newDue = getNewDueToday();
        const reviewDue = getReviewDueToday();
        const totalDue = newDue + reviewDue;

        let reviewHTML = '';
        if (reviewDue > 0) {
          reviewHTML = `<button onclick="startGlobalReview()" class="btn btn-primary" style="width:100%;margin:16px 0 24px;padding:18px;font-size:18px;">${reviewDue} review cards due • Review Now!</button>`;
        } else if (newDue > 0) {
          reviewHTML = `<div style="text-align:center;margin:24px 0;color:#64748b;font-size:17px;">${newDue} new words ready • Open a deck to study them</div>`;
        } else {
          reviewHTML = `<div style="text-align:center;margin:24px 0;color:#64748b;font-size:17px;">No cards due today 🎉</div>`;
        }

        main.innerHTML = `
          <div class="card" style="background: linear-gradient(135deg,#6d28d9,#a855f7);color:white;padding:32px 24px;border-radius:28px;">
            <h2 style="font-size:28px;font-weight:700;">${getText('welcome_back')}</h2>
            <p style="margin-top:8px;opacity:0.9;">${getText('cards_waiting', totalDue)}</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;">
              <div style="background:rgba(255,255,255,0.25);padding:16px;border-radius:20px;text-align:center;">
                <div style="font-size:34px;font-weight:700;">${getTotalCards()}</div>
                <div style="font-size:14px;">${getText('total_cards')}</div>
              </div>
              <div style="background:rgba(255,255,255,0.25);padding:16px;border-radius:20px;text-align:center;">
                <div style="font-size:34px;font-weight:700;color:#fef08c;">${newDue}</div>
                <div style="font-size:14px;">New Today</div>
              </div>
              <div style="background:rgba(255,255,255,0.25);padding:16px;border-radius:20px;text-align:center;">
                <div style="font-size:34px;font-weight:700;">${reviewDue}</div>
                <div style="font-size:14px;">Review Today</div>
              </div>
            </div>
          </div>

          ${reviewHTML}

          <div style="margin:32px 0 16px;display:flex;justify-content:space-between;align-items:center;">
            <h3 style="font-weight:600;font-size:20px;">${getText('your_decks')}</h3>
            <div>

    function startGlobalReview() {
      let reviewCards = [];
      let targetDeckId = null;

      for (let deck of decks) {
        const dueReview = getReviewDue(deck);
        if (dueReview > 0) {
          targetDeckId = deck.id;
          reviewCards = deck.cards.filter(c => {
            if (c.section === 1) return false;
            if (!c.lastReviewed) return false;
            const days = getDaysSince(c.lastReviewed);
            return days >= (globalSettings.intervals[c.section-1] || 3);
          });
          break;
        }
      }

      if (reviewCards.length === 0) {
        alert("No review cards are due today.");
        return;
      }

      currentDeckId = targetDeckId;
      currentStudySession = {
        cards: reviewCards.sort(() => Math.random() - 0.5),
        index: 0,
        mode: "normal",
        deckId: targetDeckId,
        newCount: 0
      };
      loadCurrentCard();
      document.getElementById('study-modal').style.display = 'flex';
    }

    function checkNewWordLimit() {
      const limit = globalSettings.newWordsPerDay;
      const newIntroduced = currentStudySession.newCount || 0;

      if (currentStudySession.cards[currentStudySession.index] &&
          currentStudySession.cards[currentStudySession.index].section === 1 &&
          newIntroduced >= limit) {

        const msg = `You've reached your daily word limit of ${limit}!\n\nContinue anyway?`;
        if (!confirm(msg)) {
          hideStudyModal();
          render(0);
          return false;
        }
      }
      return true;
    }

    function loadCurrentCard() {
      if (!checkNewWordLimit()) return;

      const s = currentStudySession;
      const card = s.cards[s.index];
      const deck = decks.find(d => d.id === s.deckId);
      if (!card || !deck) return;

      document.getElementById('study-deck-name').textContent = deck.name;
      document.getElementById('study-progress').textContent = `${s.index + 1} / ${s.cards.length}`;

      if (card.section === 1) {
        s.newCount = (s.newCount || 0) + 1;
      }

      document.getElementById('front-text').innerHTML = card.front || '';
      const fImg = document.getElementById('front-image');
      fImg.style.display = card.image ? 'block' : 'none';
      if (card.image) fImg.src = card.image;

      const fAud = document.getElementById('front-audio');
      fAud.style.display = (card.media && card.media.includes('audio')) ? 'block' : 'none';
      if (card.media && card.media.includes('audio')) fAud.src = card.media;

      const fVid = document.getElementById('front-video');
      fVid.style.display = (card.media && card.media.includes('video')) ? 'block' : 'none';
      if (card.media && card.media.includes('video')) fVid.src = card.media;

      document.getElementById('back-text').innerHTML = card.back || '';
      const bImg = document.getElementById('back-image');
      bImg.style.display = card.image ? 'block' : 'none';
      if (card.image) bImg.src = card.image;

      const bAud = document.getElementById('back-audio');
      bAud.style.display = (card.media && card.media.includes('audio')) ? 'block' : 'none';
      if (card.media && card.media.includes('audio')) bAud.src = card.media;

      const bVid = document.getElementById('back-video');
      bVid.style.display = (card.media && card.media.includes('video')) ? 'block' : 'none';
      if (card.media && card.media.includes('video')) bVid.src = card.media;

      document.getElementById('flashcard').classList.remove('flipped');

      document.getElementById('wrong-btn').innerHTML = getText('wrong_btn');
      document.getElementById('correct-btn').innerHTML = getText('correct_btn');

    function startStudySession(mode) {
      if (mode === 'mature' && !globalSettings.halfYearMatureReview) {
        return;
      }
      hideDeckDetailModal();
      const deck = decks.find(d => d.id === currentDeckId);
      if (!deck || !deck.cards || deck.cards.length === 0) return alert('No cards yet');

      let sessionCards = [];
      if (mode === 'mature' && globalSettings.halfYearMatureReview) {
        sessionCards = deck.cards.filter(c => c.section === globalSettings.numSections).sort(() => Math.random() - 0.5).slice(0, 15);
      } else {
        sessionCards = deck.cards.filter(c => {
          if (c.section === 1) return true;
          if (!c.lastReviewed) return true;
          const days = getDaysSince(c.lastReviewed);
          return days >= (globalSettings.intervals[c.section-1] || 3);
        });
      }

      if (sessionCards.length === 0) return alert('No cards are due right now.');

      currentStudySession = {
        cards: sessionCards,
        index: 0,
        mode,
        deckId: currentDeckId,
        newCount: 0
      };
      loadCurrentCard();
      document.getElementById('study-modal').style.display = 'flex';
    }

    function rateCard(correct) {
      const s = currentStudySession;
      const card = s.cards[s.index];
      card.lastReviewed = Date.now();

      if (s.mode === 'mature') {
        if (!correct) card.section = globalSettings.wrongSection;
      } else {
        if (correct) {
          card.section = Math.min(card.section + 1, globalSettings.numSections);
        } else {
          card.section = globalSettings.wrongSection;
        }
      }

      saveData('rate-card');

      if (s.index < s.cards.length - 1) {
        s.index++;
        loadCurrentCard();
      } else {
        alert('🎉 Study session completed!');
        hideStudyModal();
        render(0);
      }
    }

    async function handleImportFile(input) {
      const file = input.files[0];
      if (!file) return;

      const status = document.getElementById('import-status');
      status.innerHTML = `<p>📦 Loading ${file.name}... (this may take a few seconds for large decks)</p>`;

      await initSQL();

      try {
        const zip = await JSZip.loadAsync(file);

        let collectionEntry = zip.file('collection.anki21') || zip.file('collection.anki2');
        if (!collectionEntry) throw new Error('No collection database found in the file.');

        const dbBuffer = await collectionEntry.async('arraybuffer');
        const db = new SQL.Database(new Uint8Array(dbBuffer));

        const testStmt = db.prepare("SELECT flds FROM notes LIMIT 1");
        let isDummy = false;
        if (testStmt.step()) {
          const testFields = (testStmt.get()[0] || '').split('\x1f');
          if (testFields[0] && testFields[0].includes("Please update to the latest Anki version")) {
            isDummy = true;
          }
        }
        testStmt.free();

        if (isDummy) {
          throw new Error('This appears to be a dummy database. Please re-export from Anki with "Support older Anki versions" checked.');
        }

        const mediaMap = {};

        const mediaJsonFile = zip.file('media');
        if (mediaJsonFile) {
          const mediaJsonText = await mediaJsonFile.async('string');
          const mediaFilenameMap = JSON.parse(mediaJsonText);

          for (const [indexStr, realFilename] of Object.entries(mediaFilenameMap)) {
            const entry = zip.file(indexStr);
            if (entry) {
              const data = await entry.async('base64');
              const ext = (realFilename.split('.').pop() || '').toLowerCase();
              let mime = 'application/octet-stream';
              if (['jpg','jpeg','png','gif'].includes(ext)) mime = 'image/';
              else if (['mp3','ogg','wav','m4a','aac','flac','opus'].includes(ext)) mime = 'audio/';
              else if (['mp4','webm'].includes(ext)) mime = 'video/';
              const dataUrl = `data:${mime}${ext};base64,${data}`;
              mediaMap[indexStr] = dataUrl;
              mediaMap[realFilename] = dataUrl;
            }
          }
        }

        if (Object.keys(mediaMap).length === 0) {
          const mediaFiles = Object.keys(zip.files).filter(name =>
            name.match(/^\d+$/) || name.match(/\.(jpg|jpeg|png|gif|mp3|ogg|wav|m4a|aac|flac|opus|mp4|webm)$/i)
          );
          for (const fname of mediaFiles) {
            const entry = zip.file(fname);
            if (entry) {
              const data = await entry.async('base64');
              const ext = (fname.split('.').pop() || '').toLowerCase();
              let mime = 'application/octet-stream';
              if (['jpg','jpeg','png','gif'].includes(ext)) mime = 'image/';
              else if (['mp3','ogg','wav','m4a','aac','flac','opus'].includes(ext)) mime = 'audio/';
              else if (['mp4','webm'].includes(ext)) mime = 'video/';
              const dataUrl = `data:${mime}${ext};base64,${data}`;
              mediaMap[fname] = dataUrl;
            }
          }
        }

        const notesStmt = db.prepare("SELECT flds FROM notes");
        const importedCards = [];

        while (notesStmt.step()) {
          const row = notesStmt.get();
          const fields = (row[0] || '').split('\x1f');
          let front = fields[0] || 'No front';
          let back = fields[1] || (fields.slice(1).join(' • ') || 'No back');

          let cardImage = null;
          let cardMedia = null;

          Object.keys(mediaMap).forEach(key => {
            const dataUrl = mediaMap[key];

            const imgRegex = new RegExp(`<img[^>]*src=["']${escapeRegex(key)}["'][^>]*>`, 'gi');
            if (imgRegex.test(front)) {
              cardImage = dataUrl;
              front = front.replace(imgRegex, '').trim();
            }
            if (imgRegex.test(back)) {
              cardImage = dataUrl;
              back = back.replace(imgRegex, '').trim();
            }

            const soundRegex = new RegExp(`\\[sound:${escapeRegex(key)}\\]`, 'gi');
            if (soundRegex.test(front)) {
              cardMedia = dataUrl;
              front = front.replace(soundRegex, '').trim();
            }
            if (soundRegex.test(back)) {
              cardMedia = dataUrl;
              back = back.replace(soundRegex, '').trim();
            }
          });

          front = cleanupImportedText(front);
          back = cleanupImportedText(back);

          importedCards.push({
            id: generateId(),
            front: front,
            back: back,
            image: cardImage,
            media: cardMedia,
            section: 1,
            lastReviewed: null
          });
        }

        notesStmt.free();

        const deckName = file.name.replace(/\.(apkg|colpkg|ofc)$/i, '') || 'Imported Deck';
        const newDeck = {
          id: generateId(),
          name: deckName,
          description: `Imported from ${file.name} — ${importedCards.length} cards`,
          newPerDay: globalSettings.newWordsPerDay,
          cards: importedCards,
          color: '#6d28d9'
        };

        decks.push(newDeck);
        saveData('import-apkg');

        status.innerHTML += `<p style="color:#10b981;margin-top:12px;">✅ Successfully imported ${importedCards.length} cards with images and audio!</p>`;

        setTimeout(() => {
          hideImportModal();
          render(0);
          if (newDeck.id) openDeck(newDeck.id);
        }, 1500);

      } catch(e) {
        console.error("Import error:", e);
        status.innerHTML += `<p style="color:#ef4444;">Import failed.<br><br>${e.message || e}</p>`;
      }
    }

    function escapeRegex(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function cleanupImportedText(text) {
      return String(text || '')
        .replace(/\[sound:[^\]]+\]/gi, '')
        .replace(/\[\s*\]/g, '')
        .replace(/<div><\/div>/gi, '')
        .replace(/<br\s*\/?>\s*<br\s*\/?>/gi, '<br>')
        .trim();
    }

    function showSettingsModal() {
      document.getElementById('settings-modal').style.display = 'flex';
      document.getElementById('global-new-per-day').value = globalSettings.newWordsPerDay;
      document.getElementById('num-sections').value = globalSettings.numSections;
      document.getElementById('wrong-section').value = globalSettings.wrongSection;
      document.getElementById('half-year-toggle').checked = globalSettings.halfYearMatureReview;
      document.getElementById('language-select').value = currentLang;
      document.getElementById('text-size-slider').value = globalSettings.textSize || 18;
      document.getElementById('text-size-value').textContent = (globalSettings.textSize || 18) + 'px';

      document.getElementById('settings-title').textContent = getText('global_settings');
      document.getElementById('global-new-label').textContent = getText('new_words_global');
      document.getElementById('num-sections-label').textContent = getText('num_sections');
      document.getElementById('wrong-section-label').textContent = getText('wrong_section_label');
      document.getElementById('half-year-text').textContent = getText('enable_half_year');
      document.getElementById('text-size-label').textContent = getText('text_size');
      document.getElementById('language-label').innerHTML = 'Interface Language / 界面語言';
      document.getElementById('save-settings-btn').textContent = getText('save_settings');

      const container = document.getElementById('intervals-container');
      container.innerHTML = `<label style="display:block;margin-bottom:12px;">${getText('review_intervals')}</label>`;
      for (let i = 0; i < globalSettings.numSections; i++) {
        container.innerHTML += `
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <span style="width:140px;">Section ${i+1}</span>
            <input type="number" value="${globalSettings.intervals[i] || 0}" class="interval-input" data-index="${i}" style="width:100px;">
          </div>`;
      }

      let backupContainer = document.getElementById('backup-tools-container');
      if (!backupContainer) {
        backupContainer = document.createElement('div');
        backupContainer.id = 'backup-tools-container';
        const saveBtn = document.getElementById('save-settings-btn');
        saveBtn.parentNode.insertBefore(backupContainer, saveBtn);
      }

      renderBackupTools();

      const slider = document.getElementById('text-size-slider');
      slider.oninput = () => {
        document.getElementById('text-size-value').textContent = slider.value + 'px';
      };
    }

    function hideSettingsModal() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function saveSettings() {
      globalSettings.newWordsPerDay = parseInt(document.getElementById('global-new-per-day').value) || 20;
      globalSettings.numSections = parseInt(document.getElementById('num-sections').value) || 5;
      globalSettings.wrongSection = parseInt(document.getElementById('wrong-section').value) || 3;
      globalSettings.halfYearMatureReview = document.getElementById('half-year-toggle').checked;
      globalSettings.textSize = parseInt(document.getElementById('text-size-slider').value) || 18;

      const inputs = document.querySelectorAll('.interval-input');
      globalSettings.intervals = Array.from(inputs).map(inp => parseInt(inp.value) || 0);

      currentLang = document.getElementById('language-select').value;
      saveData('save-settings');

      hideSettingsModal();
      applyTextSize();
      updateNav();
      render(0);

      if (currentDeckId) {
        openDeck(currentDeckId);
      }

      alert((currentLang === 'zh' || currentLang === 'zh-TW') ? '✅ 設置已保存' : '✅ Settings saved.');
    }

    function init() {
      loadData();
      updateNav();
      if (decks.length === 0) {
        decks.push({ id: generateId(), name: "Demo Deck", description: "Your first deck", newPerDay: 20, cards: [] });
        saveData('init-demo');
      }
      applyTextSize();
      navigateTo(0);
      saveAutoVersion('app-open');
    }

    window.addEventListener('load', () => {
      const importFileInput = document.getElementById('import-file');
      if (importFileInput) {
        importFileInput.addEventListener('change', () => handleImportFile(importFileInput));
      }
      init();
    });
</script>
